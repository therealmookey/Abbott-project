<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chauffeurs - Abbott</title>
    <link rel="stylesheet" href="css/style.css?v=10">
</head>
<body>
    <div id="navigatie-placeholder"></div>
    
    <main class="container">
        <div class="page-header">
            <h1>🚚 Chauffeurs</h1>
            <button id="addChauffeurBtn" class="btn btn-primary">+ Nieuwe chauffeur toevoegen</button>
        </div>
        
        <div id="chauffeursLijst" class="admin-tabel">
            <p>Laden...</p>
        </div>
    </main>
    
    <!-- Popup voor chauffeur toevoegen/bewerken -->
    <div id="chauffeurPopup" class="popup">
        <div class="popup-content">
            <h3 id="popupTitle">Nieuwe chauffeur</h3>
            
            <label>Chauffeursnummer *</label>
            <input type="text" id="chauffeursnummer" placeholder="Bijv. CH-001" required>
            
            <label>Volledige naam *</label>
            <input type="text" id="naam" placeholder="Jan Janssens" required>
            
            <label>Telefoonnummer *</label>
            <input type="tel" id="telefoon" placeholder="0485 12 34 56" required>
            
            <label>E-mailadres</label>
            <input type="email" id="email" placeholder="jan@voorbeeld.nl">
            
            <label>WhatsApp nummer</label>
            <input type="tel" id="whatsapp" placeholder="0485 12 34 56 (voor route versturen)">
            <small>Dit nummer krijgt de route toegestuurd</small>
            
            <div style="display: flex; gap: 10px; margin-top: 1rem;">
                <button id="saveChauffeurBtn" class="btn btn-primary">Opslaan</button>
                <button id="closeChauffeurPopup" class="btn btn-secondary">Annuleren</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chauffeurs.js"></script>
</body>
</html>
