<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adressen - Abbott</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navigatie-placeholder"></div>
    
    <main class="container">
        <div class="page-header">
            <h1>📍 Adressen</h1>
            <button id="addAddressBtn" class="btn btn-primary">+ Nieuw adres toevoegen</button>
        </div>
        
        <div id="adressenLijst" class="adressen-grid">
            <p>Laden...</p>
        </div>
    </main>
    
    <div id="addressPopup" class="popup">
        <div class="popup-content">
            <h3 id="popupTitle">Nieuw adres</h3>
            <input type="text" id="instellingNaam" placeholder="Naam instelling" required>
            <input type="text" id="straat" placeholder="Straat + huisnummer" required>
            <input type="text" id="postcode" placeholder="Postcode" required>
            <input type="text" id="plaats" placeholder="Plaats" required>
            <input type="text" id="telefoon" placeholder="Telefoonnummer">
            <button id="saveAddressBtn" class="btn btn-primary">Opslaan</button>
            <button id="closeAddressPopup" class="btn btn-secondary">Annuleren</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/adressen.js"></script>
</body>
</html>
