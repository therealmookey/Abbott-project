<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adressen - Abbott</title>
    <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>
    <div id="navigatie-placeholder"></div>
    
    <main class="container">
        <div class="page-header">
            <h1>📍 Adressen</h1>
            <div class="header-buttons">
                <button id="routeBtn" class="btn btn-primary">🗺️ Route genereren (0 geselecteerd)</button>
                <button id="addAddressBtn" class="btn btn-secondary">+ Nieuw adres toevoegen</button>
            </div>
        </div>
        
        <!-- Zoekbalk -->
        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Zoeken op instelling, adres, plaats, contactpersoon..." class="search-input">
                <button id="clearSearchBtn" class="btn btn-secondary">✖ Wissen</button>
            </div>
            <div class="search-info">
                <span id="searchResultCount"></span>
            </div>
        </div>
        
        <div id="adressenLijst" class="adressen-tabel">
            <p>Laden...</p>
        </div>
    </main>
    
    <!-- Popup voor toevoegen/bewerken -->
    <div id="addressPopup" class="popup">
        <div class="popup-content">
            <h3 id="popupTitle">Nieuw adres</h3>
            
            <h4>📍 Basisgegevens</h4>
            <input type="text" id="instellingNaam" placeholder="Instellingsnaam *" required>
            <input type="text" id="straat" placeholder="Straat + huisnummer *" required>
            <input type="text" id="postcode" placeholder="Postcode *" required>
            <input type="text" id="plaats" placeholder="Plaats *" required>
            <input type="text" id="telefoon" placeholder="Telefoonnummer (algemeen)">
            
            <h4>📞 Contactpersoon</h4>
            <input type="text" id="contactpersoon_naam" placeholder="Contactpersoon naam">
            <input type="email" id="contactpersoon_email" placeholder="Contactpersoon e-mailadres">
            
            <h4>📝 Extra informatie</h4>
            <textarea id="extra_info" class="extra-info" rows="3" placeholder="Parkeren, route, laadperron, laadklep, etc."></textarea>
            
            <div style="display: flex; gap: 10px; margin-top: 1rem;">
                <button id="saveAddressBtn" class="btn btn-primary">Opslaan</button>
                <button id="closeAddressPopup" class="btn btn-secondary">Annuleren</button>
            </div>
        </div>
    </div>
    
    <!-- Route popup voor print/export -->
        <!-- Route popup voor print/export -->
    <div id="routePopup" class="popup">
        <div class="popup-content route-popup print-optimized">
            <div class="route-header">
                <h3>🚚 Routeplanning Abbott</h3>
                <p>Datum: <span id="routeDatum"></span></p>
                <button id="printRouteBtn" class="btn btn-primary print-hide">🖨️ Print route</button>
                <button id="closeRoutePopupBtn" class="btn btn-secondary print-hide">Sluiten</button>
            </div>
            
            <div class="route-start">
                <h4>📍 Startpunt (magazijn/standplaats)</h4>
                <div class="startpunt-input-group">
                    <input type="text" id="startpuntInput" class="startpunt-input" placeholder="Bijv. Magazijn Antwerpen, België">
                    <button id="startpuntOpslaanBtn" class="btn btn-secondary">💾 Opslaan</button>
                    <button id="startpuntResetBtn" class="btn btn-secondary">↺ Reset</button>
                </div>
                <p id="startpuntWeergave" class="startpunt-weergave">Magazijn / Standplaats</p>
            </div>
            
            <div class="route-stops">
                <h4>📋 Te bezoeken locaties (geoptimaliseerde volgorde)</h4>
                <div id="routeLocationsList" class="route-list">
                    <p>Geen locaties geselecteerd</p>
                </div>
            </div>
            
            <div class="route-summary">
                <h4>📊 Samenvatting</h4>
                <p>Aantal stops: <span id="aantalStops">0</span></p>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/adressen.js"></script>
</body>
</html>
