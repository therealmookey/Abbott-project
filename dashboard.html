<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Abbott</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navigatie-placeholder"></div>
    
    <main class="container">
        <div class="dashboard-header">
            <h1>Welkom, <span id="userEmail"></span>!</h1>
            <p>Beheer hier de adressen en ophalingen/afhalingen</p>
        </div>
        
        <div class="dashboard-grid">
            <div class="dashboard-card">
                <h2>📍 Adressen</h2>
                <p>Bekijk en beheer alle adressen</p>
                <button class="btn btn-primary" onclick="window.location.href='adressen.html'">Adressen beheren</button>
            </div>
            
            <div class="dashboard-card">
                <h2>📅 Ophalingen & Afhalingen</h2>
                <p>Plan nieuwe ophalingen of bekijk bestaande</p>
                <button class="btn btn-primary" onclick="window.location.href='planning.html'">Planning beheren</button>
            </div>
            
            <div class="dashboard-card">
                <h2>📊 Statistieken</h2>
                <p>Overzicht van alle geplande ophalingen</p>
                <button class="btn btn-secondary" id="statsBtn">Bekijk statistieken</button>
            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
